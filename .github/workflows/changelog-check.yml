# file: .github/workflows/changelog-check.yml
# version: 1.0.0
# guid: d8804192-1a11-40fe-92ba-8b3839c4788d

name: Changelog Fragment Check

# Fails a PR that changes code without adding a changelog fragment under
# changelog.d/. See changelog.d/README.md for the workflow. Add the
# "skip-changelog" label (or "[skip changelog]" in the PR title) to bypass
# for docs-only or trivial changes.
on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

concurrency:
  group: changelog-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  require-fragment:
    name: Require changelog fragment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      BASE_REF: ${{ github.event.pull_request.base.ref }}
      SKIP_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Check for a changelog fragment
        run: |
          set -euo pipefail

          if [[ "$SKIP_LABEL" == "true" ]]; then
            echo "::notice::'skip-changelog' label present — skipping changelog check."
            exit 0
          fi
          if [[ "$PR_TITLE" == *"[skip changelog]"* ]]; then
            echo "::notice::'[skip changelog]' in PR title — skipping changelog check."
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "$BASE_REF"

          # Files added on this branch that are real fragments: Markdown under
          # changelog.d/, excluding the docs/config/template scaffolding.
          added="$(git diff --name-only --diff-filter=A "origin/${BASE_REF}...HEAD" \
            | { grep -E '^changelog\.d/.*\.md$' || true; } \
            | { grep -vE '^changelog\.d/(README\.md$|templates/)' || true; })"

          if [[ -n "$added" ]]; then
            echo "Found changelog fragment(s):"
            echo "$added"
            exit 0
          fi

          echo "::error::No changelog fragment found under changelog.d/."
          echo "Add one with 'scriv create' (see changelog.d/README.md), or add the"
          echo "'skip-changelog' label / '[skip changelog]' in the PR title if this"
          echo "change does not need a changelog entry."
          exit 1
