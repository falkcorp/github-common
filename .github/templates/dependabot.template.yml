# file: .github/templates/dependabot.template.yml
# version: 1.1.0
# guid: 606986d1-5509-49ea-84cc-6ee708b7c244
# last-edited: 2026-07-16
#
# Instructions:
# 1. Copy this template to .github/dependabot.yml
# 2. Customize the multi-ecosystem-group with the repository's ecosystems
# 3. Add/remove package-ecosystem entries based on your project
# 4. Update schedule/timezone as needed
#
# IMPORTANT: entries that reference `multi-ecosystem-group` must NOT also set
# their own `schedule` key — schedule is a group-only key, and GitHub rejects
# the whole dependabot.yml file if any grouped entry redefines it. The
# schedule for grouped ecosystems below comes entirely from the
# multi-ecosystem-groups.dependencies block above.
# 5. Commit with: deps: initialize multi-ecosystem dependabot config

version: 2

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: weekly
      day:
        [
          SELECT: monday | tuesday | wednesday | thursday | friday | saturday | sunday,
        ]
      time: '10:00'
      timezone: America/New_York
    labels:
      - dependencies
      - dependabot
    commit-message:
      prefix: deps
      include: scope

updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - github-actions
      - ci-cd

  # Dev Containers (if present)
  - package-ecosystem: devcontainers
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - devcontainers

  # Docker (if present)
  - package-ecosystem: docker
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - containers

  # Docker Compose (if present)
  - package-ecosystem: docker-compose
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - containers

  # Git Submodules (if present)
  - package-ecosystem: gitsubmodule
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - submodules

  # Go Modules (if present)
  - package-ecosystem: gomod
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - tech:go
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # Node.js / npm (if present)
  - package-ecosystem: npm
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - tech:nodejs
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # Rust Toolchain (if present)
  - package-ecosystem: rust-toolchain
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - tech:rust

  # Cargo / Rust (if present)
  - package-ecosystem: cargo
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - tech:rust
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # uv / Python (modern Python dependency manager)
  - package-ecosystem: uv
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - tech:python
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # pip / Python (if not using uv)
  - package-ecosystem: pip
    directory: /
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - tech:python
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # pip / Python (scripts subdirectory if present)
  - package-ecosystem: pip
    directory: /scripts
    patterns: ['*']
    multi-ecosystem-group: dependencies
    labels:
      - tech:python
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
